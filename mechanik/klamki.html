<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; height: 100vh; background: rgba(0,0,0,0.85); 
            display: flex; justify-content: center; align-items: center; 
            user-select: none; font-family: 'Montserrat', sans-serif; color: white; overflow: hidden; 
        }
        
        .door-panel {
            position: relative; width: 600px; height: 350px; background: #333; 
            border: 8px solid #222; border-radius: 20px; box-shadow: inset 0 0 50px #111;
        }

        .handle-recess {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 250px; height: 80px; background: #1a1a1a; border-radius: 40px;
            box-shadow: inset 5px 5px 15px #000;
        }

        .handle {
            position: absolute; top: 50%; left: 45%; transform: translate(-50%, -50%);
            width: 180px; height: 40px; background: linear-gradient(to bottom, #888, #555);
            border-radius: 20px; box-shadow: 5px 5px 10px rgba(0,0,0,0.5);
            cursor: grab; transition: opacity 0.3s;
        }
        .handle:active { cursor: grabbing; }

        .cap {
            position: absolute; top: 50%; right: 20px; transform: translateY(-50%);
            width: 30px; height: 30px; background: #444; border-radius: 50%;
            border: 2px solid #222; cursor: pointer; transition: 0.2s;
        }
        .cap:hover { background: #555; }
        .cap.removed { opacity: 0; transform: translateY(50px); pointer-events: none; }

        .screw {
            position: absolute;
            top: 50%;
            right: 25px;
            transform: translate(0, -50%) rotate(0deg);
            width: 30px; 
            height: 30px;
            background: url('sruba.png') no-repeat center center;
            background-size: contain;
            cursor: pointer;
            transform-origin: center;
            filter: drop-shadow(2px 2px 3px #000);
        }
        .screw.removed { opacity: 0; pointer-events: none; transform: translate(0, 50px); transition: 0.5s; }
        .progress-bar-container { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); width: 400px; height: 20px; background: #111; border: 2px solid #ffb300; display: none; }
        .progress-bar { width: 0%; height: 100%; background: #ffb300; }
        .instruction { position: absolute; top: 15px; width: 100%; text-align: center; font-size: 22px; color: #ffb300; text-shadow: 2px 2px 0 #000; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="instruction" id="info">KROK 1: KLIKNIJ ZA&#346;LEPK&#280;, ABY J&#260; ZDJ&#260;&#262;</div>
    <div class="progress-bar-container" id="pb-container"><div class="progress-bar" id="bar"></div></div>

    <div class="door-panel">
        <div class="handle-recess">
            <div class="screw" id="screw" onmousedown="startUnscrew()" onmouseup="stopUnscrew()" onmouseleave="stopUnscrew()"></div>
            <div class="cap" id="cap" onclick="removeCap()"></div>
            <div class="handle" id="handle"></div>
        </div>
    </div>

    <script>
        let step = 1; 
        let progress = 0;
        let timer = null;
        let rotation = 0; 
        let isDragging = false;
        let startX = 0;
        const handle = document.getElementById('handle');

        function removeCap() {
            if (step !== 1) return;
            document.getElementById('cap').classList.add('removed');
            document.getElementById('info').innerHTML = "KROK 2: PRZYTRZYMAJ LPM NA &#346;RUBIE!";
            document.getElementById('pb-container').style.display = "block";
            step = 2;
        }

        function startUnscrew() {
            if (step !== 2) return;
            let el = document.getElementById('screw'); 
            timer = setInterval(() => {
                progress += 2; 
                rotation += 30; 

                el.style.transform = `translate(0, -50%) rotate(${rotation}deg)`;
                document.getElementById('bar').style.width = Math.min(progress, 100) + "%";

                if (progress >= 100) {
                    stopUnscrew();
                    el.classList.add('removed');
                    document.getElementById('info').innerHTML = "KROK 3: Z&#321;AP KLAMK&#280; I POCI&#260;GNIJ W LEWO!";
                    document.getElementById('pb-container').style.display = "none";
                    step = 3;
                }
            }, 30);
        }

        function stopUnscrew() {
            clearInterval(timer);
            if (step === 2 && progress < 100) {
                progress = 0;
                document.getElementById('bar').style.width = "0%";
                document.getElementById('screw').style.transform = `translate(0, -50%) rotate(0deg)`;
            }
        }
        handle.addEventListener('mousedown', (e) => {
            if (step !== 3) return;
            isDragging = true;
            startX = e.clientX - handle.offsetLeft;
        });

        window.addEventListener('mouseup', () => {
            if (step !== 3) return;
            isDragging = false;
            if (handle.offsetLeft > -100 && step === 3) {
                handle.style.left = "45%";
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging || step !== 3) return;
            
            let newX = e.clientX - startX;
            if (newX < 112) { 
                handle.style.left = newX + "px";
            }

            if (newX < -50) {
                isDragging = false;
                step = 4;
                handle.style.opacity = "0";
                document.getElementById('info').innerHTML = "KLAMKA ZDEMONTOWANA!";
                document.getElementById('info').style.color = "#00ff66";
                setTimeout(() => mta.triggerEvent("zakonczMinigreKlamki"), 1000);
            }
        });
    </script>
</body>
</html>
