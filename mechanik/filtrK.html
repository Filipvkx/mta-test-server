<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; height: 100vh; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; user-select: none; font-family: sans-serif; color: white; }
        .box { position: relative; width: 500px; height: 700px; background: #222; border: 4px solid #fff; }
        .slot { position: absolute; top: 100px; left: 50%; transform: translateX(-50%); width: 220px; height: 500px; background: #111; border: 10px solid #444; }
        .filter { position: absolute; bottom: 10px; left: 10px; width: 180px; height: 60px; background: #777; border: 2px solid #000; cursor: grab; }
        .finish { position: absolute; top: -50px; width: 100%; text-align: center; color: #0f0; }
    </style>
</head>
<body>
    <div class="box">
        <div style="padding: 10px; text-align: center;">Wyci&#261;gnij filtr ostro&#380;nie do g&oacute;ry!</div>
        <div class="slot" id="slot">
            <div class="finish">CEL</div>
            <div class="filter" id="fil" draggable="true"></div>
        </div>
    </div>
    <script>
        const fil = document.getElementById('fil');
        let isDragging = false;

        fil.onmousedown = () => isDragging = true;
        window.onmouseup = () => {
            isDragging = false;
            if(parseInt(fil.style.top) > 0) fil.style.top = "430px"; 
        };

        window.onmousemove = (e) => {
            if(!isDragging) return;
            const slotRect = document.getElementById('slot').getBoundingClientRect();
            let newY = e.clientY - slotRect.top - 30;
            
            if(e.clientX < slotRect.left + 20 || e.clientX > slotRect.right - 20) {
                isDragging = false;
                fil.style.top = "430px";
                return;
            }

            fil.style.top = newY + "px";
            if(newY < -30) mta.triggerEvent("zakonczMinigreFiltrK");
        };
    </script>
</body>
</html>
