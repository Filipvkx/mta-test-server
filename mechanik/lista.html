<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; height: 100vh; display: flex; justify-content: flex-end; align-items: flex-start;
            background-color: transparent !important; user-select: none; -webkit-user-select: none;
            box-sizing: border-box; overflow: hidden; font-family: 'Montserrat', sans-serif;
            padding-right: 20px;
            padding-top: 20px;
        }

        .card { position: relative; border-radius: 20px; width: 300px; max-height: 80vh; display: flex; flex-direction: column; z-index: 10;}
        
        .card::before {
            content: ""; position: absolute; inset: 0; 
            background-image: linear-gradient(163deg, #ffb300, #ff007f, #8a2be2, #00d4ff);
            filter: blur(15px); opacity: 0.35; z-index: -1; border-radius: 20px; transition: 0.4s;
        }

        .card2 {
            background-color: rgba(17, 17, 17, 0.85); backdrop-filter: blur(8px);
            border-radius: 20px; padding: 20px; display: flex; flex-direction: column; height: 100%; box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .head { font-size: 1.3em; font-weight: 900; color: white; text-transform: uppercase; text-align: center; margin-bottom: 5px; }
        .description { text-align: center; color: rgba(255,255,255,0.6); font-size: 0.85em; font-weight: 700; margin-bottom: 15px; }

        #hud-parts-list { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; flex-grow: 1; padding-right: 5px; }

        #hud-parts-list::-webkit-scrollbar { width: 6px; }
        #hud-parts-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        #hud-parts-list::-webkit-scrollbar-thumb { background: #8a2be2; border-radius: 10px; }

        .hud-item {
            background-color: #1a1a1a; padding: 12px 15px; border-radius: 12px; color: #fff;
            font-size: 13px; font-weight: 700; border: 1px solid rgba(255,255,255,0.05); text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .footer { margin-top: 15px; text-align: center; font-size: 11px; font-weight: 700; color: #ff007f; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
<div class="card">
    <div class="card2">
        <div class="head">Lista Zakupów</div>
        <div class="description">Części do odebrania z hurtowni w Dilmore:</div>
        <div id="hud-parts-list"></div>
        <div class="footer">[Z] - Zamknij Listę</div>
    </div>
</div>
</body>
</html>
