<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; height: 100vh; background: transparent !important; user-select: none; overflow: hidden; position: relative; font-family: 'Montserrat', sans-serif;}
        
        .btn-exit {
            position: absolute; top: 30px; right: 30px;
            border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); outline: none; transition: 0.4s ease-in-out;
            background-color: rgba(17, 17, 17, 0.85); backdrop-filter: blur(10px); color: white;
            font-weight: 900; cursor: pointer; padding: 15px 30px;
            background-size: 200% auto; text-transform: uppercase; font-size: 14px; z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .btn-exit:hover {
            background-image: linear-gradient(90deg, #ffb300, #ff007f); background-position: right center;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.6); border-color: transparent;
        }
        
        .hotspot { position: absolute; width: 90px; height: 90px; border: 4px dashed #1ac2ff; background: rgba(26, 194, 255, 0.2); border-radius: 50%; display: flex; justify-content: center; align-items: center; text-align: center; font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 10px; color: #fff; text-shadow: 2px 2px 0 #000; cursor: pointer; transition: 0.3s; animation: pulse 2s infinite; }
        .hotspot:hover { background: rgba(26, 194, 255, 0.5); border: 4px solid #1ac2ff; transform: scale(1.1); }
        
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(26, 194, 255, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(26, 194, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(26, 194, 255, 0); } }

        #koloPP { top: 68%; left: 89%; } 
        #koloPT { top: 68%; left: 13%; }
        
        #klamkaP { top: 50%; left: 35%; border-color: #fff; background: rgba(255, 255, 255, 0.1); }
        #klamkaP:hover { background: rgba(255, 255, 255, 0.3); border-color: #fff; }
    </style>
</head>
<body>
    <button class="btn-exit" onclick="mta.triggerEvent('kameraSilnikWyjscie')">Wyjd&#378; z widoku</button>

    <div class="hotspot" id="koloPP" onclick="mta.triggerEvent('odpalMinigreKola', 'koloPP')">KO&#321;O P. PRZ&Oacute;D</div>
    <div class="hotspot" id="klamkaP" onclick="mta.triggerEvent('odpalMinigreKlamki', 'klamkaP')">KLAMKA PRAWA</div>
    <div class="hotspot" id="koloPT" onclick="mta.triggerEvent('odpalMinigreKola', 'koloPT')">KO&#321;O P. TY&#321;</div>
</body>
</html>
