<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Montserrat', sans-serif; user-select: none;
            
            background: url('http://mta/local/tlo.jpg') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        .form {
            display: flex; flex-direction: column; gap: 10px; padding: 2em; padding-bottom: 1.5em;
            background-color: rgba(17, 17, 17, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 25px; transition: 0.4s ease-in-out; width: 300px;
        }

        .card {
            position: relative;
            border-radius: 25px;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0; 
            background-image: linear-gradient(163deg, #ffb300, #ff007f, #8a2be2, #00d4ff);
            filter: blur(15px); 
            opacity: 0.4; 
            z-index: -1; 
            border-radius: 25px;
            transition: all 0.4s ease-in-out;
        }

        .card:hover::before {
            opacity: 0.85; 
            filter: blur(25px); 
            inset: -4px; 
        }

        .card2 { 
            border-radius: 25px; transition: all 0.2s; height: 100%; 
        }

        #heading {
            text-align: center; margin: 0.5em 0 1em 0; color: white; font-size: 1.5em;
            font-weight: 900; letter-spacing: 1px; text-transform: uppercase;
        }

        .field {
            display: flex; align-items: center; gap: 0.5em; border-radius: 25px; padding: 0.8em;
            background-color: #171717; box-shadow: inset 2px 5px 10px rgb(5, 5, 5); transition: 0.3s;
        }

        #repeat-pass-field { display: none; opacity: 0; }
        .input-icon { height: 1.3em; width: 1.3em; fill: #ffffff; }
        .input-field { background: none; border: none; outline: none; width: 100%; color: #ffffff; font-family: 'Montserrat', sans-serif; font-size: 14px; }
        .input-field::placeholder { color: rgba(255, 255, 255, 0.6); }

        .btn { display: flex; flex-direction: column; margin-top: 1.5em; gap: 10px; }

        .button1, .button2 {
            border-radius: 5px; border: none; outline: none; transition: 0.4s ease-in-out;
            background-color: #252525; color: white; font-family: 'Montserrat', sans-serif;
            font-weight: 700; cursor: pointer; padding: 0.8em; width: 100%;
            background-size: 200% auto;
        }

        .button1:hover, .button2:hover { 
            background-image: linear-gradient(90deg, #ffb300, #ff007f, #8a2be2, #00d4ff);
            background-position: right center; 
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.5); 
        }

        .social-buttons {
            display: flex; justify-content: center; gap: 15px; margin-top: 15px;
        }

        .social-btn {
            background-color: #252525; border: none; border-radius: 50%;
            width: 45px; height: 45px; display: flex; justify-content: center;
            align-items: center; cursor: pointer; transition: all 0.3s ease;
        }

        .social-btn svg { width: 22px; height: 22px; fill: #ffffff; transition: all 0.3s ease; }

        .social-btn:hover {
            transform: translateY(-3px) scale(1.05); background-color: #1a1a1a;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .discord-btn:hover svg { fill: #5865F2; }
        .youtube-btn:hover svg { fill: #FF0000; }
        .discord-btn:hover { box-shadow: 0 0 15px rgba(88, 101, 242, 0.4); }
        .youtube-btn:hover { box-shadow: 0 0 15px rgba(255, 0, 0, 0.4); }

        .music-card {
            position: absolute; bottom: 30px; left: 30px; width: 250px; height: 120px;
            background: rgba(17, 17, 17, 0.85); backdrop-filter: blur(8px);
            border-radius: 15px; padding: 10px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .music-card .top { position: relative; width: 100%; display: flex; gap: 10px; }
        .music-card .pfp {
            position: relative; top: 5px; left: 5px; height: 40px; width: 40px;
            background-color: #222; border-radius: 5px; display: flex;
            justify-content: center; align-items: center; border: 1px solid #444;
        }

        .music-card .title-1 { color: white; font-size: 20px; font-weight: 900; margin: 0; margin-top: 5px;}
        .music-card .title-2 { color: rgba(255,255,255,0.6); font-size: 12px; font-weight: 700; margin: 0;}

        .music-card .time { width: 90%; background-color: #333; height: 6px; border-radius: 3px; position: absolute; left: 5%; bottom: 26px; }
        .music-card .elapsed { width: 42%; background-image: linear-gradient(90deg, #ffb300, #ff007f, #8a2be2, #00d4ff); height: 100%; border-radius: 3px; }

        .music-card .controls { color: white; display: flex; position: absolute; bottom: 35px; left: 0; width: 100%; justify-content: center; align-items: center; }
        .music-card .volume { height: 100%; width: 48px; opacity: 0; position: relative; transition: 0.2s; }
        .music-card .air { height: 100%; width: 48px; }

        .music-card .controls svg { cursor: pointer; transition: 0.2s; }
        .music-card .controls svg:hover { color: #ff007f; filter: drop-shadow(0 0 5px #ff007f); }

        .music-card .volume .slider { height: 4px; background-color: #333; width: 80%; border-radius: 2px; margin-top: 8px; margin-left: 10%; }
        .music-card .volume .slider .green { background-image: linear-gradient(90deg, #ffb300, #ff007f); height: 100%; width: 80%; border-radius: 3px; }
        .music-card .volume .circle { background-color: white; height: 6px; width: 6px; border-radius: 3px; position: absolute; right: 20%; top: 60%; }

        .music-card .volume_button:hover ~ .volume { opacity: 1; }
        .music-card .timetext { color: rgba(255,255,255,0.6); font-size: 10px; font-weight: 700; position: absolute; margin: 0;}
        .music-card .time_now { bottom: 11px; left: 12px; }
        .music-card .time_full { bottom: 11px; right: 12px; }

        .music-card .playing { display: flex; position: relative; justify-content: center; gap: 2px; width: 30px; height: 20px; }
        .music-card .neonline { background-image: linear-gradient(to top, #ffb300, #ff007f, #8a2be2); height: 20px; width: 3px; position: relative; transform-origin: bottom; border-radius: 2px; }

        .line-1 { animation: infinite playing 1s ease-in-out; animation-delay: 0.2s; }
        .line-2 { animation: infinite playing 1s ease-in-out; animation-delay: 0.5s; }
        .line-3 { animation: infinite playing 1s ease-in-out; animation-delay: 0.6s; }
        .line-4 { animation: infinite playing 1s ease-in-out; animation-delay: 0s; }
        .line-5 { animation: infinite playing 1s ease-in-out; animation-delay: 0.4s; }

        @keyframes playing {
            0% { transform: scaleY(0.1); }
            33% { transform: scaleY(0.6); }
            66% { transform: scaleY(0.9); }
            100% { transform: scaleY(0.1); }
        }
    </style>
</head>
<body>

<div class="card">
  <div class="card2">
    <form class="form" id="authForm">
      <p id="heading">Logowanie</p>
      
      <div class="field">
        <svg viewBox="0 0 16 16" class="input-icon"><path d="M13.106 7.222c0-2.967-2.249-5.032-5.482-5.032-3.35 0-5.646 2.318-5.646 5.702 0 3.493 2.235 5.708 5.762 5.708.862 0 1.689-.123 2.304-.335v-.862c-.43.199-1.354.328-2.29.328-2.926 0-4.813-1.88-4.813-4.798 0-2.844 1.921-4.881 4.594-4.881 2.735 0 4.608 1.688 4.608 4.156 0 1.682-.554 2.769-1.416 2.769-.492 0-.772-.28-.772-.76V5.206H8.923v.834h-.11c-.266-.595-.881-.964-1.6-.964-1.4 0-2.378 1.162-2.378 2.823 0 1.737.957 2.906 2.379 2.906.8 0 1.415-.39 1.709-1.087h.11c.081.67.703 1.148 1.503 1.148 1.572 0 2.57-1.415 2.57-3.643zm-7.177.704c0-1.197.54-1.907 1.456-1.907.93 0 1.524.738 1.524 1.907S8.308 9.84 7.371 9.84c-.895 0-1.442-.725-1.442-1.914z"></path></svg>
        <input type="text" class="input-field" placeholder="Login" id="loginInput" />
      </div>
      
      <div class="field">
        <svg viewBox="0 0 16 16" class="input-icon"><path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"></path></svg>
        <input type="password" class="input-field" placeholder="Hasło" id="passwordInput" />
      </div>

      <div class="field" id="repeat-pass-field">
        <svg viewBox="0 0 16 16" class="input-icon"><path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"></path></svg>
        <input type="password" class="input-field" placeholder="Powtórz hasło" id="repeatPasswordInput" />
      </div>
      
      <div class="btn">
        <button type="button" class="button1" id="mainActionBtn" onclick="submitAction()">Zaloguj</button>
        <button type="button" class="button2" id="toggleModeBtn" onclick="toggleMode()">Nie mam konta (Rejestracja)</button>
      </div>

      <div class="social-buttons">
          <button type="button" class="social-btn discord-btn">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512">
                  <path d="M524.531 69.836a1.5 1.5 0 0 0-.764-.7A485.065 485.065 0 0 0 404.081 32.03a1.816 1.816 0 0 0-1.923.91 337.461 337.461 0 0 0-14.9 30.6 447.848 447.848 0 0 0-134.426 0 309.541 309.541 0 0 0-15.135-30.6 1.89 1.89 0 0 0-1.924-.91 483.689 483.689 0 0 0-119.688 37.107 1.712 1.712 0 0 0-.788.676C39.068 183.651 18.186 294.69 28.43 404.354a2.016 2.016 0 0 0 .765 1.375 487.666 487.666 0 0 0 146.825 74.189 1.9 1.9 0 0 0 2.063-.676A348.2 348.2 0 0 0 208.12 430.4a1.86 1.86 0 0 0-1.019-2.588 321.173 321.173 0 0 1-45.868-21.853 1.885 1.885 0 0 1-.185-3.126 251.047 251.047 0 0 0 9.109-7.137 1.819 1.819 0 0 1 1.9-.256c96.229 43.917 200.41 43.917 295.5 0a1.812 1.812 0 0 1 1.924.233 234.533 234.533 0 0 0 9.132 7.16 1.884 1.884 0 0 1-.162 3.126 301.407 301.407 0 0 1-45.89 21.83 1.875 1.875 0 0 0-1 2.611 391.055 391.055 0 0 0 30.014 48.815 1.864 1.864 0 0 0 2.063.7A486.048 486.048 0 0 0 610.7 405.729a1.882 1.882 0 0 0 .765-1.352c12.264-126.783-20.532-236.912-86.934-334.541zM222.491 337.58c-28.972 0-52.844-26.587-52.844-59.239s23.409-59.241 52.844-59.241c29.665 0 53.306 26.82 52.843 59.239 0 32.654-23.41 59.241-52.843 59.241zm195.38 0c-28.971 0-52.843-26.587-52.843-59.239s23.409-59.241 52.843-59.241c29.667 0 53.307 26.82 52.844 59.239 0 32.654-23.177 59.241-52.844 59.241z"></path>
              </svg>
          </button>
          <button type="button" class="social-btn youtube-btn">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512">
                  <path d="M549.655 124.083c-6.281-23.65-24.787-42.276-48.284-48.597C458.781 64 288 64 288 64S117.22 64 74.629 75.486c-23.497 6.322-42.003 24.947-48.284 48.597-11.412 42.867-11.412 132.305-11.412 132.305s0 89.438 11.412 132.305c6.281 23.65 24.787 41.5 48.284 47.821C117.22 448 288 448 288 448s170.78 0 213.371-11.486c23.497-6.321 42.003-24.171 48.284-47.821 11.412-42.867 11.412-132.305 11.412-132.305s0-89.438-11.412-132.305zm-317.51 213.508V175.185l142.739 81.205-142.739 81.201z"></path>
              </svg>
          </button>
      </div>
      
    </form>
  </div>
</div>

<div class="music-card">
  <div class="top">
    <div class="pfp">
      <div class="playing">
        <div class="neonline line-1"></div>
        <div class="neonline line-2"></div>
        <div class="neonline line-3"></div>
        <div class="neonline line-4"></div>
        <div class="neonline line-5"></div>
      </div>
    </div>
    <div class="texts">
      <p class="title-1">TBoGT</p>
      <p class="title-2">Main Theme</p>
    </div>
  </div>
  
  <div class="controls">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" height="20" width="24" class="volume_button">
      <path clip-rule="evenodd" d="M11.26 3.691A1.2 1.2 0 0 1 12 4.8v14.4a1.199 1.199 0 0 1-2.048.848L5.503 15.6H2.4a1.2 1.2 0 0 1-1.2-1.2V9.6a1.2 1.2 0 0 1 1.2-1.2h3.103l4.449-4.448a1.2 1.2 0 0 1 1.308-.26Zm6.328-.176a1.2 1.2 0 0 1 1.697 0A11.967 11.967 0 0 1 22.8 12a11.966 11.966 0 0 1-3.515 8.485 1.2 1.2 0 0 1-1.697-1.697A9.563 9.563 0 0 0 20.4 12a9.565 9.565 0 0 0-2.812-6.788 1.2 1.2 0 0 1 0-1.697Zm-3.394 3.393a1.2 1.2 0 0 1 1.698 0A7.178 7.178 0 0 1 18 12a7.18 7.18 0 0 1-2.108 5.092 1.2 1.2 0 1 1-1.698-1.698A4.782 4.782 0 0 0 15.6 12a4.78 4.78 0 0 0-1.406-3.394 1.2 1.2 0 0 1 0-1.698Z" fill-rule="evenodd"></path>
    </svg>
    <div class="volume">
      <div class="slider"><div class="green"></div></div>
      <div class="circle"></div>
    </div>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" height="24" width="24">
      <path clip-rule="evenodd" d="M12 21.6a9.6 9.6 0 1 0 0-19.2 9.6 9.6 0 0 0 0 19.2Zm.848-12.352a1.2 1.2 0 0 0-1.696-1.696l-3.6 3.6a1.2 1.2 0 0 0 0 1.696l3.6 3.6a1.2 1.2 0 0 0 1.696-1.696L11.297 13.2H15.6a1.2 1.2 0 1 0 0-2.4h-4.303l1.551-1.552Z" fill-rule="evenodd"></path>
    </svg>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" height="24" width="24">
      <path clip-rule="evenodd" d="M21.6 12a9.6 9.6 0 1 1-19.2 0 9.6 9.6 0 0 1 19.2 0ZM8.4 9.6a1.2 1.2 0 1 1 2.4 0v4.8a1.2 1.2 0 1 1-2.4 0V9.6Zm6-1.2a1.2 1.2 0 0 0-1.2 1.2v4.8a1.2 1.2 0 1 0 2.4 0V9.6a1.2 1.2 0 0 0-1.2-1.2Z" fill-rule="evenodd"></path>
    </svg>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" height="24" width="24">
      <path clip-rule="evenodd" d="M12 21.6a9.6 9.6 0 1 0 0-19.2 9.6 9.6 0 0 0 0 19.2Zm4.448-10.448-3.6-3.6a1.2 1.2 0 0 0-1.696 1.696l1.551 1.552H8.4a1.2 1.2 0 1 0 0 2.4h4.303l-1.551 1.552a1.2 1.2 0 1 0 1.696 1.696l3.6-3.6a1.2 1.2 0 0 0 0-1.696Z" fill-rule="evenodd"></path>
    </svg>
    <div class="air"></div>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" stroke="currentColor" fill="none" height="20" width="24">
      <path d="M3.343 7.778a4.5 4.5 0 0 1 7.339-1.46L12 7.636l1.318-1.318a4.5 4.5 0 1 1 6.364 6.364L12 20.364l-7.682-7.682a4.501 4.501 0 0 1-.975-4.904Z"></path>
    </svg>
  </div>
  <div class="time"><div class="elapsed"></div></div>
  <p class="timetext time_now">1:31</p>
  <p class="timetext time_full">3:46</p>
</div>

<script>
    let isLoginMode = true;

    function toggleMode() {
        isLoginMode = !isLoginMode;
        const repeatField = document.getElementById("repeat-pass-field");
        
        if (isLoginMode) {
            document.getElementById("heading").innerText = "Logowanie";
            document.getElementById("mainActionBtn").innerText = "Zaloguj";
            document.getElementById("toggleModeBtn").innerText = "Nie mam konta (Rejestracja)";
            repeatField.style.display = "none";
            repeatField.style.opacity = "0";
        } else {
            document.getElementById("heading").innerText = "Rejestracja";
            document.getElementById("mainActionBtn").innerText = "Utwórz konto";
            document.getElementById("toggleModeBtn").innerText = "Mam już konto (Logowanie)";
            repeatField.style.display = "flex";
            setTimeout(() => repeatField.style.opacity = "1", 50);
        }
    }

    function submitAction() {
        var login = document.getElementById("loginInput").value;
        var pass = document.getElementById("passwordInput").value;
        
        if (isLoginMode) {
            mta.triggerEvent("auth:clientLogin", login, pass);
        } else {
            var repPass = document.getElementById("repeatPasswordInput").value;
            mta.triggerEvent("auth:clientRegister", login, pass, repPass);
        }
    }
</script>

</body>
</html>
