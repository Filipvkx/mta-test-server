<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; 
            display: flex; background-color: #000; font-family: 'Montserrat', sans-serif; 
            overflow: hidden; user-select: none;
        }

        .city-panel {
            flex: 1; position: relative; cursor: pointer; overflow: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
            will-change: transform; 
        }

        .bg-image {
            position: absolute; inset: 0;
            background-size: cover; background-position: center;
            filter: grayscale(1); 
            transition: filter 0.4s ease, transform 0.5s ease, opacity 0.4s ease;
            z-index: 1; opacity: 0.5;
            will-change: filter, transform; 
            transform: translateZ(0); 
        }

        .bg-ls { background-image: url('ls.jpg'); }
        .bg-sf { background-image: url('sf.jpg'); }
        .bg-lv { background-image: url('lv.jpg'); }

        .city-panel:hover .bg-image {
            filter: grayscale(0);
            transform: scale(1.05) translateZ(0);
            opacity: 1;
        }

        .city-panel:hover {
            outline: 3px solid white; 
            outline-offset: -3px;
            z-index: 10;
        }

        .content {
            position: relative; z-index: 2; text-align: center; color: white;
            background: rgba(0, 0, 0, 0.7); 
            padding: 15px 25px; border-radius: 5px;
            transition: transform 0.3s ease;
            pointer-events: none; 
        }

        .city-name { font-size: 32px; font-weight: 900; margin: 0; text-transform: uppercase; }

        .city-desc {
            font-size: 13px; font-weight: 400; margin-top: 10px;
            display: none; 
            color: #ccc;
        }

        .city-panel:hover .city-desc {
            display: block;
        }
    </style>
</head>
<body>
    <div class="city-panel" onclick="mta.triggerEvent('wybierzSpawn', 'LS')">
        <div class="bg-image bg-ls"></div>
        <div class="content"><p class="city-name">Los Santos</p><p class="city-desc">Urząd miasta, bank, cygan.</p></div>
    </div>
    <div class="city-panel" onclick="mta.triggerEvent('wybierzSpawn', 'SF')">
        <div class="bg-image bg-sf"></div>
        <div class="content"><p class="city-name">San Fierro</p><p class="city-desc">Prawo jazdy, magazyn, przechowalnia.</p></div>
    </div>
    <div class="city-panel" onclick="mta.triggerEvent('wybierzSpawn', 'LV')">
        <div class="bg-image bg-lv"></div>
        <div class="content"><p class="city-name">Las Venturas</p><p class="city-desc">Kasyno, giełda, prace.</p></div>
    </div>
</body>
</html>
